name: TagBot
on:
  issue_comment:
    types:
      - created
  workflow_dispatch:
    inputs:
      lookback:
        default: '3'
        description: Number of days to look back for newly registered versions.

jobs:
  TagBot:
    if: github.event_name == 'workflow_dispatch' || github.actor == 'JuliaTagBot'
    runs-on: ubuntu-latest
    steps:
      - uses: JuliaRegistries/TagBot@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Uncomment the line below if you want TagBot to trigger Documenter.jl builds for new releases
          # ssh: ${{ secrets.DOCUMENTER_KEY }}